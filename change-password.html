<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | CKL HRMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .container h1 {
            text-align: center;
            color: #1e4668;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }
        .container .sub {
            text-align: center;
            color: #5a6e7c;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e4668;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d4dee5;
            border-radius: 12px;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
        }
        .btn-submit {
            width: 100%;
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover {
            background: #1e5a74;
        }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .message {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .message.error {
            display: block;
            background: #fee2e2;
            color: #dc2626;
        }
        .message.success {
            display: block;
            background: #dcfce7;
            color: #16a34a;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #2c7da0;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Change Password</h1>
        <p class="sub">For your account security, please change your default password.</p>

        <form id="changePasswordForm">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter your current password" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password (min. 6 characters)" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your new password" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Change Password</button>
            <div id="message" class="message"></div>
            <a href="javascript:history.back()" class="back-link">← Back</a>
        </form>
    </div>

    <script>
        const API_BASE = '/hrms/backend/api/';

        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const current_password = document.getElementById('currentPassword').value.trim();
            const new_password = document.getElementById('newPassword').value.trim();
            const confirm_password = document.getElementById('confirmPassword').value.trim();
            const msgDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            msgDiv.className = 'message';
            msgDiv.textContent = '';

            if (!current_password || !new_password || !confirm_password) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'All fields are required.';
                return;
            }

            if (new_password !== confirm_password) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'New passwords do not match.';
                return;
            }

            if (new_password.length < 6) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Password must be at least 6 characters.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                const res = await fetch(API_BASE + 'change_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        current_password: current_password,
                        new_password: new_password,
                        confirm_password: confirm_password
                    })
                });
                const data = await res.json();

                if (data.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = '✅ ' + data.message + ' You will be redirected to login.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Change Password';

                    setTimeout(() => {
                        window.location.href = '/hrms/login.html';
                    }, 2000);
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = 'Error: ' + data.message;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Change Password';
                }
            } catch (error) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Error: ' + error.message;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Change Password';
            }
        });
    </script>
</body>
</html>
