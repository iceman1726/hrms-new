<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CKL HRMS</title>
    <link rel="icon" type="image/x-icon" href="CKL-1.PNG">    
    <style>
         * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://hrms.envisionsystem.com/images/big/bg1.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            min-height: 100vh;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-container h1 {
            text-align: center;
            color: #1e4668;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }
        .login-container .subtitle {
            text-align: center;
            color: #5a6e7c;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e4668;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d4dee5;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
        }
        .btn-login {
            width: 100%;
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            background: #1e5a74;
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .message {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .message.error {
            display: block;
            background: #fee2e2;
            color: #dc2626;
        }
        .message.success {
            display: block;
            background: #dcfce7;
            color: #16a34a;
        }
        .logo {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .logo h2 {
            color: #1e4668;
            font-size: 1.5rem;
        }
        .logo p {
            color: #5a6e7c;
            font-size: 0.7rem;
        }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #8a9aa8;
        }
        .footer a {
            color: #2c7da0;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
        <image src ="CKL-1.PNG" width="150" height="150" />
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div id="message" class="message"></div>
        </form>

        <div class="footer">
            <p>Default password for all accounts: <strong>password</strong></p>
        </div>
    </div>

    <script>
        const API_BASE = '/hrms/backend/api/';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            messageDiv.className = 'message';
            messageDiv.textContent = '';

            if (!email || !password) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'All fields are required.';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const res = await fetch(API_BASE + 'login_check.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('user_id', data.user.id);
                    localStorage.setItem('employee_id', data.user.employee_id);
                    localStorage.setItem('user_name', data.user.name);
                    localStorage.setItem('user_role', data.user.role);
                    localStorage.setItem('user_position', data.user.position);

                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Login successful! Redirecting...';

                    setTimeout(() => {
                        switch(data.user.role) {
                            case 'hr':
                                window.location.href = '/hrms/hr/dashboard.php';
                                break;
                            case 'coordinator':
                                window.location.href = '/hrms/coordinator/dashboard.php';
                                break;
                            case 'team_leader':
                                window.location.href = '/hrms/teamleader/tl-dashboard.php';
                                break;
                            default:
                                window.location.href = '/hrms/employee/dashboard.php';
                        }
                    }, 1500);

                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message || 'Login failed. Please try again.';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }

            } catch (error) {
                console.error('Login error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Connection error. Please try again.';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
